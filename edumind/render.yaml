services:
  - type: web
    name: edumind-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
